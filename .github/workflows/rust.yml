name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-A warnings"

jobs:
  build:
    runs-on: ubuntu-latest

    # 赋予工作流创建 Release 的写入权限
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ✨ 核心增补 1：必须先安装 Node.js 环境
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # 根据你的前端需求指定版本
        cache: 'npm'       # 自动缓存 npm 依赖，加速安装
        cache-dependency-path: 'web/c5-ui/package-lock.json'

    - name: Set up Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    # ✨ 核心改进 2：拆分前端构建步骤，更易排查错误
    - name: Build & Deploy Frontend
      working-directory: web/c5-ui   # 直接指定工作目录，无需手动 cd
      run: |
        npm install
        npm run build
        npm run deploy

    # ✨ 核心改进 3：编译 Rust 后端
    - name: Build Rust Backend
      run: cargo build -r --verbose  # 默认在根目录执行，无需 cd ../../
    
      # ✨ 核心增补 1：重命名并整理二进制文件（方便用户下载）
    # 注意：请把下面的 your_project_name 改成你 Cargo.toml 里的实际二进制程序名
    - name: Prepare Artifacts
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        mkdir -p dist
        cp target/release/agent dist/
        cd dist && tar -czvf ../backend-linux-amd64.tar.gz *

    # ✨ 核心增补 2：自动创建 Release 并上传文件
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: backend-linux-amd64.tar.gz # 要上传的压缩包路径
        body: |
          Automated Release by GitHub Actions.
          - Commit: ${{ github.sha }}
        draft: false
        prerelease: false