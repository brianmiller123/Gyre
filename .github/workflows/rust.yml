name: Rust

on:
  push:
    branches: [ "main" ]
    # ⚠️ 关键：branches 过滤器会排除 tag 推送，必须显式加 tags 才能在打 tag 时触发 release
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-A warnings"

jobs:
  build:
    runs-on: ubuntu-latest

    # 赋予工作流创建 Release 的写入权限
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # ✨ 核心增补 1：必须先安装 Node.js 环境
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # 根据你的前端需求指定版本
        cache: 'npm'       # 自动缓存 npm 依赖，加速安装
        cache-dependency-path: 'web/c5-ui/package-lock.json'

    - name: Set up Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2

    # ✨ 核心改进 2：拆分前端构建步骤，更易排查错误
    - name: Build & Deploy Frontend
      working-directory: web/c5-ui   # 直接指定工作目录，无需手动 cd
      run: |
        npm install
        npm run build
        npm run deploy

    # ✨ 核心改进 3：编译 Rust 后端
    - name: Build Rust Backend
      run: cargo build -r --verbose  # 默认在根目录执行，无需 cd ../../
    
    # ✨ 核心增补 1：整理二进制文件（方便用户下载）
    # 二进制名 agent 来自 crates/cli 的 [[bin]] name = "agent"
    - name: Prepare Artifacts
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        set -euo pipefail
        # 显式校验：二进制不存在就直接失败，避免后面建出"只有源码"的空 release
        test -f target/release/agent || {
          echo "❌ target/release/agent 不存在：请确认 cargo build -r 成功，且 crates/cli 配置了 [[bin]] name=\"agent\""
          exit 1
        }
        mkdir -p dist
        cp target/release/agent dist/
        # 用 -C 指定打包目录，比 cd + 通配符 * 更稳健（不丢 dotfile、不受 shell 展开影响）
        tar -czvf backend-linux-amd64.tar.gz -C dist .
        echo "✅ 产物已生成："; ls -lh backend-linux-amd64.tar.gz

    # ✨ 核心增补 2：自动创建 Release 并上传文件
    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: backend-linux-amd64.tar.gz # 要上传的压缩包路径
        # 关键：files 没匹配到任何文件时让 Action 直接失败，而不是静默建一个只有源码的 release
        fail_on_unmatched_files: true
        body: |
          Automated Release by GitHub Actions.
          - Commit: ${{ github.sha }}
        draft: false
        prerelease: false